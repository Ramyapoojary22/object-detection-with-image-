<!DOCTYPE html>
<html>
<head>
<title>Login - AI Object Detection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins', sans-serif;}

body{
    height:100vh;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* background animation */
body::before{
    content:'';
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle,#00c6ff33,transparent);
    animation: moveBg 8s linear infinite;
}

@keyframes moveBg{
    0%{transform:translate(0,0);}
    50%{transform:translate(-25%,-25%);}
    100%{transform:translate(0,0);}
}

/* container */
.container{
    position:relative;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    width:320px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* title */
h2{
    color:white;
    margin-bottom:20px;
}

/* flash */
.flash{
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    font-size:14px;
}
.flash.success{background:#2ecc71;}
.flash.danger{background:#e74c3c;}
.flash.warning{background:#f39c12;}

/* inputs */
.input-box{
    position:relative;
    margin:15px 0;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.2);
    color:white;
}

.input-box label{
    position:absolute;
    left:10px;
    top:12px;
    color:#ddd;
    font-size:14px;
    transition:0.3s;
}

.input-box input:focus + label,
.input-box input:valid + label{
    top:-8px;
    left:5px;
    font-size:12px;
    color:#00c6ff;
}

/* toggle */
.toggle{
    position:absolute;
    right:10px;
    top:12px;
    cursor:pointer;
    font-size:12px;
    color:#00c6ff;
}

/* button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

button:hover{
    transform:scale(1.05);
}

/* link */
a{
    display:block;
    margin-top:15px;
    color:#00c6ff;
    text-decoration:none;
}

/* loading */
.loading{
    display:none;
    margin-top:10px;
    font-size:13px;
    color:#00c6ff;
}
</style>

</head>

<body>

<div class="container">
    <h2>🔐 Login</h2>

    <!-- Flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" onsubmit="return handleLogin()">

        <div class="input-box">
            <input type="text" name="username" required autofocus autocomplete="username">
            <label>Username</label>
        </div>

        <div class="input-box">
            <input type="password" name="password" id="password" required autocomplete="current-password">
            <label>Password</label>
            <span class="toggle" onclick="togglePassword()">Show</span>
        </div>

        <button id="loginBtn" type="submit">Login</button>

        <div class="loading" id="loadingText">🔐 Logging in...</div>
    </form>

    <a href="/register">Create Account</a>
</div>

<script>
function togglePassword(){
    const pass = document.getElementById("password");
    const toggle = document.querySelector(".toggle");

    if(pass.type === "password"){
        pass.type = "text";
        toggle.textContent = "Hide";
    } else {
        pass.type = "password";
        toggle.textContent = "Show";
    }
}

function handleLogin(){
    const btn = document.getElementById("loginBtn");
    const loading = document.getElementById("loadingText");

    btn.disabled = true;
    loading.style.display = "block";

    return true;
}
</script>

</body>
</html>
